name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build app without signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project ccbili.xcodeproj \
            -scheme ccbili \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/ccbili.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build/Build/Products -maxdepth 3 -type d -name "*.app" -print || true
            exit 1
          fi

          rm -rf Payload ccbili-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry ccbili-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccbili-unsigned-ipa
          path: ccbili-unsigned.ipa
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ccbili-unsigned.ipa
          generate_release_notes: true



