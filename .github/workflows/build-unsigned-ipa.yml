name: Build Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, for example v1.0.103-202604301200
        required: false
        type: string
      release_name:
        description: Release name, defaults to release_tag
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Resolve packages
        run: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project ccbili.xcodeproj \
            -scheme ccbili \
            -derivedDataPath build

      - name: Build app without signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project ccbili.xcodeproj \
            -scheme ccbili \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            VALIDATE_PRODUCT=NO \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/ccbili.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build/Build/Products -maxdepth 3 -type d -name "*.app" -print || true
            exit 1
          fi

          rm -rf Payload ccbili-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry ccbili-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccbili-unsigned-ipa
          path: ccbili-unsigned.ipa
          if-no-files-found: error

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('RELEASE_NOTES.md')
          data = path.read_bytes()
          if data.startswith(b'\xef\xbb\xbf'):
              data = data[3:]
          path.write_text(data.decode('utf-8', errors='replace'), encoding='utf-8', newline='\n')
          PY

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${{ inputs.release_tag }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$TAG_NAME"
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.release.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_name }}
          files: ccbili-unsigned.ipa
          body_path: RELEASE_NOTES.md




